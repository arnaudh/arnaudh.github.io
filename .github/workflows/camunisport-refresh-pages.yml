name: CamUniSport Refresh And Deploy

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run refresh only (skip Pages deploy)"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "22 6-23 * * *"
      timezone: "Europe/London"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Refresh CamUniSport JSON
        run: |
          python camunisport/fetch_availability.py \
            --json-out camunisport/availability.json

      - name: Validate generated JSON
        run: python -m json.tool camunisport/availability.json > /dev/null

      - name: Configure Pages
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        id: deployment
        uses: actions/deploy-pages@v5
